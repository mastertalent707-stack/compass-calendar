name: Deploy to environment

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag being deployed, such as v1.2.3'
        required: true
        type: string
      environment:
        description: 'GitHub Environment to deploy to'
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.tag }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Derive image version
        id: version
        run: |
          IMAGE_VERSION="${{ inputs.tag }}"
          IMAGE_VERSION="${IMAGE_VERSION#v}"
          echo "image_version=${IMAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push environment-specific web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/docker/Dockerfile.web
          push: true
          build-args: |
            BASEURL=${{ vars.BACKEND_API_URL }}
            GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
            POSTHOG_KEY=${{ (inputs.environment == 'production' || inputs.environment == 'staging-cloud') && vars.POSTHOG_KEY || '' }}
            POSTHOG_HOST=${{ (inputs.environment == 'production' || inputs.environment == 'staging-cloud') && vars.POSTHOG_HOST || '' }}
            COMPASS_BUILD_REF=${{ steps.version.outputs.image_version }}
          tags: switchbacktech/compass-web:${{ inputs.environment }}-${{ steps.version.outputs.image_version }}

      - name: Deploy release to ${{ inputs.environment }}
        env:
          # Non-sensitive
          BACKEND_API_URL: ${{ vars.BACKEND_API_URL }}
          COMPOSE_GIT_REF: ${{ vars.COMPOSE_GIT_REF }}
          COMPOSE_PROFILES: ${{ vars.COMPOSE_PROFILES }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          GCAL_NOTIFICATION_EXPIRATION_MIN: ${{ vars.GCAL_NOTIFICATION_EXPIRATION_MIN }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          IMAGE_VERSION: ${{ steps.version.outputs.image_version }}
          KIT_USER_TAG_ID: ${{ inputs.environment == 'production' && vars.KIT_USER_TAG_ID || '' }}
          POSTHOG_KEY: ${{ (inputs.environment == 'production' || inputs.environment == 'staging-cloud') && vars.POSTHOG_KEY || '' }}
          POSTHOG_HOST: ${{ (inputs.environment == 'production' || inputs.environment == 'staging-cloud') && vars.POSTHOG_HOST || '' }}
          RELEASE_TAG: ${{ inputs.tag }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          WEB_IMAGE: switchbacktech/compass-web:${{ inputs.environment }}-${{ steps.version.outputs.image_version }}
          # Sensitive
          COMPASS_SYNC_TOKEN: ${{ secrets.COMPASS_SYNC_TOKEN }}
          GCAL_NOTIFICATION_TOKEN: ${{ secrets.GCAL_NOTIFICATION_TOKEN }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          KIT_API_SECRET: ${{ inputs.environment == 'production' && secrets.KIT_API_SECRET || '' }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          MONGO_REPLICA_SET_KEY: ${{ secrets.MONGO_REPLICA_SET_KEY }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SUPERTOKENS_KEY: ${{ secrets.SUPERTOKENS_KEY }}
          SUPERTOKENS_POSTGRES_PASSWORD: ${{ secrets.SUPERTOKENS_POSTGRES_PASSWORD }}
          SUPERTOKENS_URI: ${{ secrets.SUPERTOKENS_URI }}
        run: |
          echo "Deploying Compass ${RELEASE_TAG} (image version: ${IMAGE_VERSION}) to ${{ inputs.environment }}"
          if [ "${{ inputs.environment }}" = "production" ]; then
            if [ -z "$KIT_API_SECRET" ] || [ -z "$KIT_USER_TAG_ID" ]; then
              echo "Production deploy requires KIT_API_SECRET and KIT_USER_TAG_ID." >&2
              exit 1
            fi
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          {
            printf '%s\n' \
              'runtime:' \
              "  version: \"${IMAGE_VERSION}\"" \
              '  nodeEnv: production' \
              '  timezone: Etc/UTC' \
              'web:' \
              '  port: 9080' \
              "  url: \"${FRONTEND_URL}\"" \
              "  image: \"${WEB_IMAGE}\"" \
              'backend:' \
              '  port: 3000' \
              "  apiUrl: \"${BACKEND_API_URL}\"" \
              '  originsAllowed:' \
              "    - \"${FRONTEND_URL}\"" \
              "  compassToken: \"${COMPASS_SYNC_TOKEN}\"" \
              'mongo:' \
              '  username: compass' \
              "  password: \"${MONGO_PASSWORD}\"" \
              ${MONGO_REPLICA_SET_KEY:+"  replicaSetKey: \"${MONGO_REPLICA_SET_KEY}\""} \
              "  uri: \"${MONGO_URI}\"" \
              'supertokens:' \
              "  uri: \"${SUPERTOKENS_URI}\"" \
              "  key: \"${SUPERTOKENS_KEY}\"" \
              ${SUPERTOKENS_POSTGRES_PASSWORD:+'  postgres:'} \
              ${SUPERTOKENS_POSTGRES_PASSWORD:+'    user: supertokens'} \
              ${SUPERTOKENS_POSTGRES_PASSWORD:+"    password: \"${SUPERTOKENS_POSTGRES_PASSWORD}\""} \
              ${SUPERTOKENS_POSTGRES_PASSWORD:+'    database: supertokens'} \
              'google:' \
              "  clientId: \"${GOOGLE_CLIENT_ID}\"" \
              "  clientSecret: \"${GOOGLE_CLIENT_SECRET}\"" \
              "  notificationToken: \"${GCAL_NOTIFICATION_TOKEN}\"" \
              ${GCAL_NOTIFICATION_EXPIRATION_MIN:+"  channelExpirationMin: ${GCAL_NOTIFICATION_EXPIRATION_MIN}"}
            if [ -n "$POSTHOG_KEY" ] && [ -n "$POSTHOG_HOST" ]; then
              printf '%s\n' \
                'posthog:' \
                "  key: \"${POSTHOG_KEY}\"" \
                "  host: \"${POSTHOG_HOST}\""
            fi
            if [ -n "$KIT_API_SECRET" ] && [ -n "$KIT_USER_TAG_ID" ]; then
              printf '%s\n' \
                'email:' \
                "  kitApiSecret: \"${KIT_API_SECRET}\"" \
                "  kitUserTagId: \"${KIT_USER_TAG_ID}\""
            fi
          } | ssh -i ~/.ssh/staging_key "$SSH_USER@$SSH_HOST" \
                "umask 077 && mkdir -p ~/compass && cat > ~/compass/compass.yaml && chmod 644 ~/compass/compass.yaml"
          COMPOSE_GIT_REF="${COMPOSE_GIT_REF:-${RELEASE_TAG}}"
          compose_url="https://raw.githubusercontent.com/SwitchbackTech/compass/${COMPOSE_GIT_REF}/self-host/compose.yaml"
          if ! curl -fsSL "$compose_url" -o /dev/null; then
            echo "Could not fetch self-host files from ${COMPOSE_GIT_REF}; falling back to ${RELEASE_TAG}."
            COMPOSE_GIT_REF="${RELEASE_TAG}"
          fi
          ssh -i ~/.ssh/staging_key "$SSH_USER@$SSH_HOST" "curl -fsSL https://raw.githubusercontent.com/SwitchbackTech/compass/${COMPOSE_GIT_REF}/self-host/compose.yaml -o ~/compass/compose.yaml"
          ssh -i ~/.ssh/staging_key "$SSH_USER@$SSH_HOST" "curl -fsSL https://raw.githubusercontent.com/SwitchbackTech/compass/${COMPOSE_GIT_REF}/self-host/compass -o ~/compass/compass && chmod +x ~/compass/compass"
          ssh -i ~/.ssh/staging_key "$SSH_USER@$SSH_HOST" "cd ~/compass && COMPOSE_PROFILES=selfhosted docker compose --project-name compass -f compose.yaml down 2>/dev/null || true"
          if [ -n "$COMPOSE_PROFILES" ]; then
            ssh -i ~/.ssh/staging_key "$SSH_USER@$SSH_HOST" "cd ~/compass && COMPOSE_PROFILES='${COMPOSE_PROFILES}' ./compass update"
          else
            ssh -i ~/.ssh/staging_key "$SSH_USER@$SSH_HOST" "cd ~/compass && ./compass update"
          fi
